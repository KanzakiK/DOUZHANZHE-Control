<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <!-- Primary gradient: blue → purple diagonal -->
    <linearGradient id="hex-grad" x1="24" y1="240" x2="232" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <!-- Bolt gradient: vertical deep blue → bright purple -->
    <linearGradient id="bolt-grad" x1="128" y1="220" x2="128" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <!-- Bolt highlight -->
    <linearGradient id="bolt-highlight" x1="110" y1="180" x2="160" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E9D5FF" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- ===== OUTER HEXAGONAL RING (broken/dashed) ===== -->
  <!-- Flat-top hexagon, center (128,128), radius 108 -->
  <!-- Segment: top edge -->
  <line x1="74" y1="34.5" x2="182" y2="34.5" stroke="url(#hex-grad)" stroke-width="7" stroke-linecap="round"/>
  <!-- Segment: top-right -->
  <line x1="182" y1="34.5" x2="236" y2="128" stroke="url(#hex-grad)" stroke-width="7" stroke-linecap="round"/>
  <!-- Gap: right side (V2→V3) — breakout opening -->
  <!-- Segment: bottom edge -->
  <line x1="182" y1="221.5" x2="74" y2="221.5" stroke="url(#hex-grad)" stroke-width="7" stroke-linecap="round"/>
  <!-- Segment: bottom-left -->
  <line x1="74" y1="221.5" x2="20" y2="128" stroke="url(#hex-grad)" stroke-width="7" stroke-linecap="round"/>
  <!-- Segment: top-left -->
  <line x1="20" y1="128" x2="74" y2="34.5" stroke="url(#hex-grad)" stroke-width="7" stroke-linecap="round"/>

  <!-- ===== BREAKOUT ACCENT (at the hex gap) ===== -->
  <line x1="240" y1="140" x2="248" y2="154" stroke="#A78BFA" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="234" y1="152" x2="244" y2="168" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- ===== INNER LIGHTNING BOLT ===== -->
  <!-- Bold zigzag bolt: sharp S-curve for clear readability at all sizes -->
  <path d="M152 42 L80 134 L120 134 L92 216 L178 120 L136 120 L166 42 Z"
        fill="url(#bolt-grad)"/>
  <!-- Highlight facet (upper-left face of bolt) -->
  <path d="M152 42 L136 120 L166 42 Z" fill="url(#bolt-highlight)" opacity="0.45"/>
  <!-- Lower edge accent -->
  <path d="M92 216 L120 134 L110 175 Z" fill="url(#bolt-highlight)" opacity="0.2"/>

  <!-- ===== VERTEX ACCENT NODES ===== -->
  <circle cx="74" cy="34.5" r="4.5" fill="#60A5FA" opacity="0.55"/>
  <circle cx="182" cy="34.5" r="4" fill="#7C3AED" opacity="0.45"/>
  <circle cx="182" cy="221.5" r="4" fill="#7C3AED" opacity="0.35"/>
  <circle cx="74" cy="221.5" r="4.5" fill="#3B82F6" opacity="0.45"/>
  <circle cx="20" cy="128" r="4" fill="#3B82F6" opacity="0.4"/>
</svg>